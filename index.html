<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquetación Web - Formulario</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.png">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand">Proyecto: 2.2 Maquetación Web</span>
        </div>
    </nav>

    <main class="container content">
        <section class="form-card">
            <h2>Contáctanos</h2>
            <p>Por favor, completa los 5 campos solicitados.</p>
            
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" class="form-control" placeholder="Ej. Jesús Sergio Quiroz">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="usuario@ejemplo.com">
                </div>

                <div class="form-group">
                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" class="form-control" placeholder="771XXXXXXX">
                </div>

                <div class="form-group">
                    <label for="subject">Asunto</label>
                    <input type="text" id="subject" class="form-control" placeholder="Motivo del contacto">
                </div>

                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" class="form-control" rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>
                </div>

                <button type="submit" class="btn-primary">Enviar Formulario</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Desarrollado por: <strong>Jesús Sergio Quiroz Guzmán</strong></p>
            <p>Instituto Tecnológico de Pachuca | 2026</p>
        </div>
    </footer>

</body>
</html>
